<div class="dashboard-card">

    <div class="card-header">

        <div>

            <h2>{{title}}</h2>

            <p>{{subtitle}}</p>

        </div>

        <div class="table-actions">

            <input
                id="tableSearch"
                type="text"
                placeholder="Search...">

        </div>

    </div>

    <div class="table-wrapper">

        <table class="phoenix-table">

            <thead id="tableHead">

            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </div>

    <div class="table-footer">

        <div id="tableInfo">

            Showing 0 of 0

        </div>

        <div class="pagination">

            <button id="prevPage">

                Previous

            </button>

            <span id="pageNumber">

                1

            </span>

            <button id="nextPage">

                Next

            </button>

        </div>

    </div>

</div>
