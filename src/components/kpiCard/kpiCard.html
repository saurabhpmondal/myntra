<div class="kpi-card">

    <div class="kpi-header">

        <span class="kpi-title">
            {{title}}
        </span>

        <i data-lucide="{{icon}}"></i>

    </div>

    <div class="kpi-value">

        {{value}}

    </div>

    <div class="kpi-footer">

        <span class="kpi-change {{trendClass}}">

            {{change}}

        </span>

        <span class="kpi-period">

            vs Last Month

        </span>

    </div>

</div>
