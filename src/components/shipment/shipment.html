<div class="shipment-page">

    <!-- ==========================================
         CONFIGURATION
    =========================================== -->

    <div class="dashboard-card shipment-config-card">

        <div class="card-header">

            <div>

                <h2 class="card-title">

                    Shipment Planner

                </h2>

                <p class="card-subtitle">

                    Configure shipment parameters and generate shipment recommendation.

                </p>

            </div>

        </div>

        <div class="shipment-config-grid">

            <div class="shipment-field">

                <label>

                    Sale Days

                </label>

                <select id="shipment-sale-days">

                    <option value="30" selected>

                        30 Days

                    </option>

                    <option value="45">

                        45 Days

                    </option>

                    <option value="60">

                        60 Days

                    </option>

                </select>

            </div>

            <div class="shipment-field">

                <label>

                    Target Cover

                </label>

                <select id="shipment-target-cover">

                    <option value="45" selected>

                        45 Days

                    </option>

                    <option value="60">

                        60 Days

                    </option>

                    <option value="90">

                        90 Days

                    </option>

                </select>

            </div>

            <div class="shipment-field">

                <label>

                    Recall Trigger

                </label>

                <select id="shipment-recall-trigger">

                    <option value="60" selected>

                        60 Days

                    </option>

                    <option value="90">

                        90 Days

                    </option>

                    <option value="120">

                        120 Days

                    </option>

                </select>

            </div>

            <div class="shipment-field">

                <label>

                    Shipment Type

                </label>

                <select id="shipment-type">

                    <option value="SJIT" selected>

                        SJIT

                    </option>

                    <option value="SOR">

                        SOR

                    </option>

                </select>

            </div>

        </div>

        <div class="shipment-action">

            <button
                id="generate-shipment"
                class="btn btn-primary">

                Generate Shipment

            </button>

        </div>

    </div>

    <!-- ==========================================
         RESULT SECTION
    =========================================== -->

    <div
        id="shipment-result"
        class="shipment-result hidden">

        <!-- KPI Cards -->

        <div id="shipment-kpis"></div>

        <!-- Search + Export -->

        <div class="shipment-toolbar">

            <input
                type="text"
                id="shipment-search"
                class="shipment-search"
                placeholder="Search Style ID / ERP SKU..." />

            <div id="shipment-export"></div>

        </div>

        <!-- Information -->

        <div
            id="shipment-info"
            class="shipment-info">

        </div>

        <!-- Report -->

        <div id="shipment-table"></div>

    </div>

</div>
