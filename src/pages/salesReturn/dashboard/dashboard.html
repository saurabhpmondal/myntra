<section
    id="salesReturnDashboard"
    class="phoenix-page">

    <!-- ========================================= -->
    <!-- Header -->
    <!-- ========================================= -->

    <div class="page-header">

        <div>

            <h2>

                Sales & Return Analysis

            </h2>

            <p>

                Sales, Cancellation, RTO and Customer Return Analytics

            </p>

        </div>

        <button
            id="salesReturnExport"
            class="btn btn-primary">

            Export Excel

        </button>

    </div>

    <!-- ========================================= -->
    <!-- Filters -->
    <!-- ========================================= -->

    <section
        id="salesReturnFilters"
        class="dashboard-card">

        <div class="filter-grid">

            <select
                id="salesReturnMonthFilter"
                multiple>

            </select>

            <select
                id="salesReturnBrandFilter"
                multiple>

            </select>

            <select
                id="salesReturnPOTypeFilter"
                multiple>

            </select>

            <select
                id="salesReturnRiskFilter"
                multiple>

            </select>

            <input

                id="salesReturnStyleSearch"

                type="search"

                placeholder="Search Style ID..."

            />

        </div>

    </section>

    <!-- ========================================= -->
    <!-- KPI -->
    <!-- ========================================= -->

    <section
        class="kpi-grid">

        <div id="kpiSale"></div>

        <div id="kpiCancel"></div>

        <div id="kpiRTO"></div>

        <div id="kpiCXReturn"></div>

        <div id="kpiNet"></div>

    </section>

    <!-- ========================================= -->
    <!-- Insights -->
    <!-- ========================================= -->

    <section

        id="salesReturnInsights"

        class="insights-grid">

    </section>

    <!-- ========================================= -->
    <!-- PO Type -->
    <!-- ========================================= -->

    <section

        id="salesReturnPOType">

    </section>

    <!-- ========================================= -->
    <!-- Brand -->
    <!-- ========================================= -->

    <section

        id="salesReturnBrand">

    </section>

    <!-- ========================================= -->
    <!-- Style -->
    <!-- ========================================= -->

    <section

        id="salesReturnStyle">

    </section>

    <!-- ========================================= -->
    <!-- Return Reason -->
    <!-- ========================================= -->

    <section

        id="salesReturnReturnReason">

    </section>

    <!-- ========================================= -->
    <!-- Trend -->
    <!-- ========================================= -->

    <section

        id="salesReturnTrend">

    </section>

</section>
